<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC ServerList - Admin Panel</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="fav.png" type="image/png">
</head>

<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-mc">MC</span>
                <span class="logo-text">ServerList</span>
            </div>

            <nav class="nav-right">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Hjem</a>
                    <a href="admin.html" class="nav-link" id="nav-admin-link" style="display: none;">Admin Panel</a>
                </div>

                <div class="user-badges">
                    <!-- Ejerens altid synlige badge -->
                    <div class="badge-pill" title="Ejer" style="cursor: default;">
                        <img src="https://minotar.net/helm/Broskiii_/24.png" alt="Broskiii_ face">
                        Broskiii_ <span class="rank-badge admin">Ejer</span>
                    </div>
                    
                    <!-- Discord Login sektion -->
                    <div id="auth-section" style="display: flex; gap: 12px; align-items: center;">
                        <!-- Genereres via JS (Discord Login) -->
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="main-header">
            <h1>Admin <span class="text-green">Panel</span></h1>
            <p class="subtitle">Tilføj nye servere til oversigten her.</p>
        </div>

        <div class="admin-card">
            <h2 style="margin-bottom: 16px; font-size: 20px;">Tilføj Server</h2>
            <form id="add-server-form">
                <div class="form-group">
                    <label for="server-name-input">Server Navn</label>
                    <input type="text" id="server-name-input" required placeholder="F.eks. Survival">
                </div>
                <div class="form-group">
                    <label for="server-desc-input">Beskrivelse</label>
                    <input type="text" id="server-desc-input" required placeholder="Kort beskrivelse...">
                </div>
                <div class="form-group">
                    <label for="server-status-input">Status</label>
                    <select id="server-status-input">
                        <option value="aktiv">Aktiv</option>
                        <option value="inaktiv">Inaktiv</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Tilføj Server</button>
            </form>
        </div>

        <div class="admin-card" style="margin-top: 24px;">
            <form id="remove-server-form">
                <h2 style="margin-bottom: 16px; font-size: 20px;">Fjern Server</h2>
                <div class="form-group">
                    <label for="remove-server-select">Vælg Server</label>
                    <select id="remove-server-select" required>
                        <option value="" disabled selected>-- Vælg en server --</option>
                        <!-- Genereres via JS -->
                    </select>
                </div>
                <button type="submit" class="submit-btn" style="background-color: #ef4444;">Fjern Valgte Server</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
