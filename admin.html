<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC ServerList - Admin Panel</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="fav.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-mc">MC</span>
                <span class="logo-text">ServerList</span>
            </div>
            
            <nav class="nav-right">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Hjem</a>
                    <a href="admin.html" class="nav-link">Admin Panel</a>
                </div>
                
                <div class="user-badges">
                    <a href="#" class="badge-pill">
                        <img src="https://ui-avatars.com/api/?name=B&background=0284c7&color=fff&rounded=true&size=24" alt="blue icon">
                        birkpb
                    </a>
                    <a href="#" class="badge-pill">
                        <img src="https://minotar.net/helm/Steve/24.png" alt="mc face">
                        BirkPB
                    </a>
                    <button class="logout-btn" title="Log ud">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="main-header">
            <h1>Admin <span class="text-green">Panel</span></h1>
            <p class="subtitle">Tilføj nye servere til oversigten her.</p>
        </div>

        <div class="admin-card">
            <form id="add-server-form">
                <div class="form-group">
                    <label for="server-name-input">Server Navn</label>
                    <input type="text" id="server-name-input" required placeholder="F.eks. Survival">
                </div>
                <div class="form-group">
                    <label for="server-desc-input">Beskrivelse</label>
                    <input type="text" id="server-desc-input" required placeholder="Kort beskrivelse...">
                </div>
                <div class="form-group">
                    <label for="server-status-input">Status</label>
                    <select id="server-status-input">
                        <option value="aktiv">Aktiv</option>
                        <option value="inaktiv">Inaktiv</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Tilføj Server</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
