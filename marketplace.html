<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC ServerList - Marketplace</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="fav.png" type="image/png">
</head>

<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-mc">MC</span>
                <span class="logo-text">ServerList</span>
            </div>

            <nav class="nav-right">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Hjem</a>
                    <a href="marketplace.html" class="nav-link">Marketplace</a>
                    <a href="admin.html" class="nav-link">Admin Panel</a>
                </div>

                <div class="user-badges">
                    <a href="#" class="badge-pill">
                        <img src="https://ui-avatars.com/api/?name=B&background=0284c7&color=fff&rounded=true&size=24"
                            alt="blue icon">
                        birkpb
                    </a>
                    <a href="#" class="badge-pill">
                        <img src="https://minotar.net/helm/Steve/24.png" alt="mc face">
                        BirkPB
                    </a>
                    <button class="logout-btn" title="Log ud">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="main-header">
            <h1>Market<span class="text-green">place</span></h1>
            <p class="subtitle">Køb færdige Minecraft servere for rigtige penge (DKK) eller in-game valuta (EMS).</p>
        </div>

        <div class="server-cards" id="marketplace-list-container">
            <!-- Market cards genereres via JS -->
        </div>

    </main>

    <!-- MODAL TIL KØB -->
    <div id="buy-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-buy-modal close-modal">&times;</span>
            <h2>Køb Server: <span id="buy-server-name" class="text-green">Navn</span></h2>
            <p class="modal-desc" style="margin-bottom: 24px;">Udfyld informationerne nedenfor for at sende en
                købsanmodning til administratoren.</p>

            <form id="buy-form">
                <div class="form-group">
                    <label for="buyer-name">Dit Minecraft / Discord Navn</label>
                    <input type="text" id="buyer-name" required placeholder="F.eks. Broskiii_">
                </div>

                <div class="form-group">
                    <label>Betalingsmetode</label>
                    <div class="payment-methods" style="display: flex; gap: 12px; margin-top: 8px;">
                        <label class="payment-option">
                            <input type="radio" name="payment_method" value="dkk" id="pay-dkk" checked>
                            <div class="payment-card">
                                💵 DKK
                            </div>
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment_method" value="ems" id="pay-ems">
                            <div class="payment-card">
                                <img src="https://minecraft.wiki/images/Emerald_JE3_BE3.png" alt="Emerald"
                                    style="width: 16px; height: 16px; image-rendering: pixelated;"> EMS
                            </div>
                        </label>
                    </div>
                </div>

                <div class="buy-summary"
                    style="background: #f9fafb; padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e5e7eb;">
                    <p style="margin: 0; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: #374151;">Pris:</span>
                        <strong id="buy-price-display" style="font-size: 18px; color: #22c55e;">0 DKK</strong>
                    </p>
                </div>

                <!-- Hidden inputs to keep track of current selection -->
                <input type="hidden" id="internal-dkk-price">
                <input type="hidden" id="internal-ems-price">

                <button type="submit" class="submit-btn">Send Købsanmodning</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
